<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown to Robert</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #fdfaf0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            flex-direction: column;
            color: white;
        }

        /* --- Full Page Porto Sunset Background for finale --- */
        .porto-sunset {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1563245372-f21724e3856d?w=1600&h=900&fit=crop'); /* Porto sunset theme */
            background-size: cover;
            background-position: center;
            z-index: -1;
            filter: brightness(0.6);
        }

        #timer-content {
            z-index: 10;
        }

        h2 {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            margin-bottom: 20px;
        }

        #countdown {
            font-size: 3rem;
            font-weight: bold;
            font-family: monospace;
            background: rgba(0, 0, 0, 0.4);
            padding: 20px 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="porto-sunset"></div>

    <div id="timer-content">
        <h2>Until I see you again...</h2>
        <div id="countdown">00d 00h 00m 00s</div>
    </div>

    <script>
        // Set your next meeting date here!
        const nextMeetingDate = new Date("April 15, 2026 12:00:00").getTime();

        function startTimer() {
            setInterval(function() {
                const now = new Date().getTime();
                const distance = nextMeetingDate - now;

                if (distance < 0) {
                    document.getElementById("countdown").innerHTML = "SEE YOU TODAY!";
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById("countdown").innerHTML = days + "d " + hours + "h " + minutes + "m " + seconds + "s ";
            }, 1000);
        }

        startTimer();
    </script>
</body>
</html>
