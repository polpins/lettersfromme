<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letter from me</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;700&family=Nothing+You+Could+Do&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #f4d03f; --dark: #1a2421; --paper: #fdfaf0; --text-color: #2c241e; }
        body, html { margin: 0; padding: 0; background: var(--dark); color: var(--gold); font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
        section { min-height: 100vh; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; position: relative; }
        
        /* 0: LOGIN */
        #login { display: flex; }
        .birthday-logo { font-family: 'Great Vibes', cursive; font-size: clamp(3rem, 10vw, 6rem); margin-bottom: 20px; line-height: 1; }
        .input-box { background: transparent; border: none; border-bottom: 2px solid var(--gold); color: var(--gold); font-size: 1.2rem; text-align: center; outline: none; width: 280px; margin-top: 30px; }

        /* 1: PIXAR MAP */
        .map-area { width: 90%; max-width: 800px; height: 400px; position: relative; background: rgba(255,255,255,0.03); border-radius: 15px; margin: 20px 0; overflow: hidden; border: 1px solid rgba(244, 208, 63, 0.1); }
        .dot { width: 14px; height: 14px; border-radius: 50%; position: absolute; filter: blur(1px); z-index: 5; }
        #lightA { background: #00f2ff; box-shadow: 0 0 20px #00f2ff; } 
        #lightB { background: #ff0077; box-shadow: 0 0 20px #ff0077; }
        
        .traveling #lightA { animation: pathA 12s forwards ease-in-out; }
        .traveling #lightB { animation: pathB 12s forwards ease-in-out; }

        @keyframes pathA {
            0% { left: 10%; top: 35%; opacity: 1; }
            30% { left: 25%; top: 30%; }
            60% { left: 45%; top: 35%; }
            95% { left: 43%; top: 38%; opacity: 1; transform: scale(1); }
            100% { left: 43%; top: 38%; opacity: 0; transform: scale(0); }
        }
        @keyframes pathB {
            0% { left: 42%; top: 60%; opacity: 1; }
            33% { left: 20%; top: 35%; }
            66% { left: 48%; top: 25%; }
            95% { left: 43.5%; top: 38.5%; transform: scale(1); }
            100% { left: 43.5%; top: 38.5%; transform: scale(3); box-shadow: 0 0 50px var(--gold); }
        }

        /* 2: ENGLAND (EL DISEÑO QUE PASASTE) */
        #london { background: #6b7a63; /* Verde oliva de tu captura */ }
        .paper-letter {
            background: var(--paper);
            background-image: url('https://www.transparenttextures.com/patterns/cardboard-flat.png'); /* Textura de papel */
            color: var(--text-color);
            padding: 60px 40px;
            max-width: 500px;
            width: 85%;
            box-shadow: 20px 20px 60px rgba(0,0,0,0.4);
            text-align: left;
            position: relative;
            transform: rotate(-1.5deg);
            display: none;
            border-radius: 2px;
        }
        .paper-letter h2 {
            font-family: 'Great Vibes', cursive;
            font-size: 3.8rem;
            margin: 0;
            text-align: right;
            line-height: 0.8;
            color: #3d2b1f;
        }
        .letter-body {
            font-family: 'Nothing You Could Do', cursive;
            font-size: 1.15rem;
            line-height: 1.8;
            margin-top: 30px;
            color: #4a3728;
        }
        .snow { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background-image: radial-gradient(circle, #fff 1px, transparent 1px); background-size: 50px 50px; animation: snowMove 10s linear infinite; opacity: 0.2; }
        @keyframes snowMove { from { background-position: 0 0; } to { background-position: 500px 1000px; } }

        /* 3: FINAL */
        #timer { font-size: 2.8rem; font-weight: bold; margin: 25px 0; font-family: monospace; color: var(--gold); }
        .btn { background: var(--gold); color: var(--dark); padding: 15px 35px; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; margin-top: 30px; transition: 0.3s; z-index: 10; }
        .btn-paper { background: #3d2b1f; color: var(--paper); width: 100%; margin-top: 40px; }
    </style>
</head>
<body>

    <section id="login">
        <div class="birthday-logo">Once Upon a Birthday</div>
        <input type="text" id="nameInput" class="input-box" placeholder="Type your name and get a recap" oninput="checkName()">
    </section>

    <section id="map-scene">
        <div class="map-area" id="mapFrame">
            <div class="dot" id="lightA"></div>
            <div class="dot" id="lightB"></div>
        </div>
        <div style="max-width: 650px; font-size: 0.95rem; line-height: 1.6; color: #fff;">
            <p>Two trajectories that, on paper, should never intersect. Two orbits separated by oceans.</p>
            <p><strong>0.00001% becomes 100% reality on one corner of one street.</strong></p>
            <button class="btn" onclick="showLondon()">Now press the England button</button>
        </div>
    </section>

    <section id="london">
        <div class="snow"></div>
        <div id="envIcon" style="font-size: 5rem; cursor: pointer; z-index: 10;" onclick="revealLondon()">✉️</div>
        
        <div class="paper-letter" id="londonLetter">
            <h2>Thank you<br>very much!</h2>
            <div class="letter-body">
                <p>Against all odds. Against common sense.</p>
