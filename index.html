<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Once Upon a Birthday</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;700&family=Nothing+You+Could+Do&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #f4d03f; --dark: #1a2421; --paper: #fdfaf0; }
        html, body { margin: 0; padding: 0; background: var(--dark); color: var(--gold); font-family: 'Montserrat', sans-serif; min-height: 100%; }
        section { min-height: 100vh; display: none; flex-direction: column; align-items: center; justify-content: flex-start; padding: 60px 20px; text-align: center; box-sizing: border-box; }

        /* LOGIN */
        #login { display: flex; justify-content: center; }
        .birthday-logo { font-family: 'Great Vibes', cursive; font-size: clamp(3rem, 10vw, 6rem); margin-bottom: 20px; }
        .input-box { background: transparent; border: none; border-bottom: 2px solid var(--gold); color: var(--gold); font-size: 1.5rem; text-align: center; outline: none; width: 320px; }

        /* MAPA ANIMACIÓN PIXAR */
        .map-area { width: 100%; max-width: 600px; height: 300px; background: rgba(255,255,255,0.05); border-radius: 15px; margin: 20px 0; position: relative; overflow: hidden; border: 1px solid var(--gold); flex-shrink: 0; }
        .dot { width: 14px; height: 14px; border-radius: 50%; position: absolute; }
        #lightA { background: #00f2ff; box-shadow: 0 0 15px #00f2ff; } 
        #lightB { background: #ff0077; box-shadow: 0 0 15px #ff0077; }
        
        .traveling #lightA { animation: pathA 12s forwards linear; }
        .traveling #lightB { animation: pathB 12s forwards linear; }

        @keyframes pathA { 
            0% { left: 10%; top: 35%; } /* San Diego */
            30% { left: 25%; top: 30%; } /* Pennsylvania */
            65% { left: 45%; top: 35%; } /* Madrid */
            100% { left: 43%; top: 38%; opacity: 0; } /* Porto */
        }
        @keyframes pathB { 
            0% { left: 42%; top: 60%; } /* Madeira */
            33% { left: 20%; top: 35%; } /* Indiana */
            66% { left: 48%; top: 25%; } /* Suiza */
            100% { left: 43.5%; top: 38.5%; transform: scale(3.5); box-shadow: 0 0 50px var(--gold); } /* Choque */
        }

        /* ESCENA INGLATERRA */
        #london { background: #6b7a63; }
        .envelope-wrapper { position: relative; width: 300px; height: 200px; cursor: pointer; z-index: 10; margin-top: 50px; }
        .envelope-closed { position: absolute; width: 100%; height: 100%; background: #d4a373; border-radius: 5px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 4rem; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .heart-seal { font-size: 2rem; color: #a62a2a; margin-top: -10px; }

        .paper-letter { background: var(--paper); background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png'); color: #2c241e; padding: 40px; max-width: 500px; width: 90%; box-shadow: 15px 15px 50px rgba(0,0,0,0.4); text-align: left; border-radius: 2px; display: none; animation: slideUp 0.8s forwards ease-out; margin: 20px 0; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }

        .paper-letter h2 { font-family: 'Great Vibes', cursive; font-size: 3.5rem; margin: 0; text-align: right; line-height: 0.9; }
